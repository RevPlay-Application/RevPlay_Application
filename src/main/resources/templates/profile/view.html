<!-- 
  User Profile View Template
  This comprehensive page displays both basic listener profiles and advanced artist profiles.
  It dynamically adjusts its layout based on the 'role' of the user being viewed.
  Features include:
  - Conditional rendering of artist banners and badges.
  - Profile picture display with a fallback to a default SVG.
  - Engagement stats showing playlist counts, favorites, and following status.
  - Interactive 'Edit Profile' modal with file upload support for media updates.
  The data is powered by the 'UserDto' (userProfile model attribute) fetched from the UserService.
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <!-- Injects the standard head fragment with the profile-specific tab title. -->
    <div th:replace="~{fragments/layout :: head('My Profile - RevPlay')}"></div>
</head>

<body>

    <!-- Injects the shared navigation bar. -->
    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div id="main-content">

        <!-- 
          Artist Banner Section:
          - th:if: Only renders if the user has the 'ARTIST' role and a banner image is present.
          - th:src: Dynamically resolves the banner image path from the Model.
        -->
        <div th:if="${userProfile.role == 'ARTIST' && userProfile.bannerImageUrl != null}"
            class="position-relative overflow-hidden" style="height: 300px; margin-top: -2rem;">
            <img th:src="@{${userProfile.bannerImageUrl}}" alt="Artist Banner" class="w-100 h-100"
                style="object-fit: cover; filter: brightness(0.8);">
            <div class="position-absolute bottom-0 start-0 w-100 h-50 bg-gradient-to-t"
                style="background: linear-gradient(transparent, rgba(0,0,0,0.4));"></div>
        </div>

        <!-- Profile Detail Section -->
        <div class="container mt-n5 position-relative" style="z-index: 2;">
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden mb-5">
                <div class="card-body p-4 p-md-5 text-center">

                    <div class="position-relative mb-4 d-inline-block">
                        <!-- Profile Image Logic: Shows the user's uploaded pic OR a default fallback. -->
                        <img th:if="${userProfile.profilePictureUrl != null}"
                            th:src="@{${userProfile.profilePictureUrl}}" alt="Profile"
                            class="rounded-circle shadow-lg border border-4 border-white"
                            style="width: 160px; height: 160px; object-fit: cover;">
                        <img th:unless="${userProfile.profilePictureUrl != null}"
                            th:src="@{/images/default-profile.svg}" alt="Default Profile"
                            class="rounded-circle shadow-lg border border-4 border-white bg-light"
                            style="width: 160px; height: 160px; object-fit: cover;">
                    </div>

                    <!-- 
                      Name Header: 
                      - th:text: Uses a ternary operator to decide between 'artistName' and 'displayName' 
                        depending on the account type.
                    -->
                    <h1 class="display-5 fw-bold mb-1"
                        th:text="${userProfile.role == 'ARTIST' ? userProfile.artistName : userProfile.displayName}">
                        Name</h1>
                    <p class="text-muted fs-5 mb-3">@<span th:text="${userProfile.username}">username</span></p>

                    <div class="mb-4">
                        <!-- Role-specific badges fetched from UserDto role field. -->
                        <span th:if="${userProfile.role == 'ARTIST'}"
                            class="badge bg-orange-soft text-orange px-3 py-2 fs-6 rounded-pill">Artist</span>
                        <span th:if="${userProfile.role == 'ARTIST' && userProfile.genre != null}"
                            class="badge bg-secondary px-3 py-2 fs-6 rounded-pill mx-1"
                            th:text="${userProfile.genre}">Genre</span>
                        <span th:if="${userProfile.role == 'USER'}"
                            class="badge bg-light text-muted px-3 py-2 fs-6 rounded-pill">Listener</span>
                    </div>

                    <!-- th:text: Injects the user's personal biography text. -->
                    <p class="lead mx-auto mb-4" style="max-width: 700px;" th:text="${userProfile.bio}">Bio
                        placeholder...</p>

                    <!-- Socials: Each link only renders if the corresponding URL exists in the 'userProfile' object. -->
                    <div class="d-flex justify-content-center align-items-center mb-5 gap-3 flex-wrap">
                        <div th:if="${not #strings.isEmpty(userProfile.instagramUrl)}" class="small text-muted">
                            <span class="fw-bold">Instagram:</span>
                            <a th:href="${userProfile.instagramUrl}" target="_blank"
                                class="text-primary text-decoration-none" th:text="${userProfile.instagramUrl}"></a>
                        </div>
                        <div th:if="${not #strings.isEmpty(userProfile.twitterUrl)}" class="small text-muted">
                            <span class="fw-bold">Twitter:</span>
                            <a th:href="${userProfile.twitterUrl}" target="_blank"
                                class="text-primary text-decoration-none" th:text="${userProfile.twitterUrl}"></a>
                        </div>
                        <div th:if="${not #strings.isEmpty(userProfile.youtubeUrl)}" class="small text-muted">
                            <span class="fw-bold">YouTube:</span>
                            <a th:href="${userProfile.youtubeUrl}" target="_blank"
                                class="text-primary text-decoration-none" th:text="${userProfile.youtubeUrl}"></a>
                        </div>
                        <div th:if="${not #strings.isEmpty(userProfile.spotifyUrl)}" class="small text-muted">
                            <span class="fw-bold">Spotify:</span>
                            <a th:href="${userProfile.spotifyUrl}" target="_blank"
                                class="text-primary text-decoration-none" th:text="${userProfile.spotifyUrl}"></a>
                        </div>
                        <div th:if="${not #strings.isEmpty(userProfile.websiteUrl)}" class="small text-muted">
                            <span class="fw-bold">Website:</span>
                            <a th:href="${userProfile.websiteUrl}" target="_blank"
                                class="text-primary text-decoration-none" th:text="${userProfile.websiteUrl}"></a>
                        </div>
                    </div>

                    <div class="d-flex gap-2 justify-content-center">
                        <!-- Button triggers the Edit Profile Modal defined later in the file. -->
                        <button type="button" class="btn btn-primary px-5 rounded-pill shadow" data-bs-toggle="modal"
                            data-bs-target="#editProfileModal">
                            Edit Profile
                        </button>
                    </div>

                </div>
            </div>

            <!-- Stats Grid: These numeric values are calculated and passed from UserServiceImpl. -->
            <div class="row g-4 mb-5 justify-content-center">
                <div class="col-6 col-md-4">
                    <div class="card p-4 h-100 text-center border-0 shadow-sm bg-light">
                        <h2 class="fw-bold text-orange mb-0" th:text="${userProfile.totalPlaylists}">0</h2>
                        <small class="text-uppercase text-muted fw-bold tracking-wider"
                            style="font-size: 0.7rem;">Playlists</small>
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div class="card p-4 h-100 text-center border-0 shadow-sm bg-light">
                        <h2 class="fw-bold text-orange mb-0" th:text="${userProfile.favoriteSongsCount}">0</h2>
                        <small class="text-uppercase text-muted fw-bold tracking-wider"
                            style="font-size: 0.7rem;">Favorites</small>
                    </div>
                </div>
                <div class="col-6 col-md-4">
                    <div class="card p-4 h-100 text-center border-0 shadow-sm bg-light">
                        <h2 class="fw-bold text-orange mb-0" th:text="${userProfile.followingCount}">0</h2>
                        <small class="text-uppercase text-muted fw-bold tracking-wider"
                            style="font-size: 0.7rem;">Following</small>
                    </div>
                </div>
            </div>
        </div>

    </div><!-- /#main-content -->

    <!-- 
      Edit Profile Modal 
      Provides a comprehensive form to update user details.
      - th:object="${userProfile}": Binds inputs to the UserDto.
      - enctype="multipart/form-data": Required for processing image uploads (Profile Pic, Artist Banner).
    -->
    <div class="modal fade" id="editProfileModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg rounded-2 overflow-hidden text-start">
                <div class="modal-header bg-primary text-white border-0 py-3">
                    <h5 class="modal-title fw-bold">Edit Your Profile</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4 pt-0" style="max-height: 70vh; overflow-y: auto;">
                    <form method="post" th:action="@{/profile/edit}" th:object="${userProfile}"
                        enctype="multipart/form-data" class="mt-4">

                        <div class="row mb-3">
                            <div class="col-md-6" th:if="${userProfile.role == 'USER'}">
                                <label for="mDisplayName" class="form-label fw-bold small text-muted">Display
                                    Name</label>
                                <input type="text" id="mDisplayName" th:field="*{displayName}"
                                    class="form-control rounded-2 border-light shadow-sm" />
                            </div>
                            <!-- Conditional inputs for artists only. -->
                            <div class="col-md-6" th:if="${userProfile.role == 'ARTIST'}">
                                <label for="mArtistName" class="form-label fw-bold small text-muted">Artist Name</label>
                                <input type="text" id="mArtistName" th:field="*{artistName}"
                                    class="form-control rounded-2 border-light shadow-sm" />
                            </div>
                            <div class="col-md-6" th:if="${userProfile.role == 'ARTIST'}">
                                <label for="mGenre" class="form-label fw-bold small text-muted">Genre</label>
                                <input type="text" id="mGenre" th:field="*{genre}"
                                    class="form-control rounded-2 border-light shadow-sm" />
                            </div>
                        </div>

                        <div class="mb-3">
                            <label for="mBio" class="form-label fw-bold small text-muted">Biography</label>
                            <textarea id="mBio" th:field="*{bio}" class="form-control rounded-2 border-light shadow-sm"
                                rows="3"></textarea>
                        </div>

                        <div class="row mb-4">
                            <div class="col-md-6">
                                <label for="mProfilePic" class="form-label fw-bold small text-muted">Profile
                                    Picture</label>
                                <!-- name="profilePic": Mapped to the MultipartFile parameter in ProfileController. -->
                                <input type="file" id="mProfilePic" name="profilePic"
                                    class="form-control rounded-2 border-light shadow-sm" accept="image/*" />
                            </div>
                            <div class="col-md-6" th:if="${userProfile.role == 'ARTIST'}">
                                <label for="mBannerPic" class="form-label fw-bold small text-muted">Banner Image</label>
                                <!-- name="bannerPic": Mapped to the MultipartFile parameter in ProfileController. -->
                                <input type="file" id="mBannerPic" name="bannerPic"
                                    class="form-control rounded-2 border-light shadow-sm" accept="image/*" />
                            </div>
                        </div>

                        <!-- Artist-specific social link inputs. -->
                        <div class="card bg-light mb-4 border-0" th:if="${userProfile.role == 'ARTIST'}">
                            <div class="card-header border-0 bg-transparent text-primary fw-bold pb-0">
                                Artist Socials</div>
                            <div class="card-body py-3">
                                <div class="row g-2">
                                    <div class="col-md-6 mb-2">
                                        <input type="text"
                                            class="form-control form-control-sm rounded-2 border-light shadow-sm"
                                            th:field="*{instagramUrl}" placeholder="Instagram URL">
                                    </div>
                                    <div class="col-md-6 mb-2">
                                        <input type="text"
                                            class="form-control form-control-sm rounded-2 border-light shadow-sm"
                                            th:field="*{twitterUrl}" placeholder="Twitter URL">
                                    </div>
                                    <div class="col-md-6 mb-2">
                                        <input type="text"
                                            class="form-control form-control-sm rounded-2 border-light shadow-sm"
                                            th:field="*{youtubeUrl}" placeholder="YouTube URL">
                                    </div>
                                    <div class="col-md-6 mb-2">
                                        <input type="text"
                                            class="form-control form-control-sm rounded-2 border-light shadow-sm"
                                            th:field="*{spotifyUrl}" placeholder="Spotify URL">
                                    </div>
                                    <div class="col-md-12">
                                        <input type="text"
                                            class="form-control form-control-sm rounded-2 border-light shadow-sm"
                                            th:field="*{websiteUrl}" placeholder="Personal Website">
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg fw-bold shadow rounded-2">Save Profile
                                Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Injects the standard footer fragment. -->
    <div th:replace="~{fragments/layout :: footer}"></div>

</body>

</html>

<!--
  Layout Fragment Template
  This file serves as the master structural template for the entire RevPlay application.
  It utilizes Thymeleaf 'fragments' to define reusable components like the <head>, <nav>, and <footer>.
  By centralizing these elements, we ensure a consistent branding, navigation, and security 
  experience across every page without duplicating code. It also manages the global 
  Spring Security state to show/hide links based on the user's login status.
-->
<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">


<!-- 
  Head Fragment: th:fragment="head(title)"
  - th:fragment: Defines a reusable block named 'head' that accepts a dynamic 'title' parameter.
  - th:text="${title}": Dynamically sets the <title> tag using the string passed from the calling page.
  - th:href="@{/icon}": Uses the Thymeleaf URL syntax to correctly resolve the path to the favicon and CSS.
-->

<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">RevPlay</title>
    <link rel="icon" type="image/png" th:href="@{/images/fav-icon.png}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

    <!-- 
      Navbar Fragment: th:fragment="navbar"
      - th:href="@{/}": Generates a safe context-aware link to the homepage.
      - th:src="@{/images/logo.png}": Resolves the branding image path.
      - sec:authorize="isAuthenticated()": Only renders the Favorites, Playlists, and History links if a user is logged in.
      - sec:authorize="!isAuthenticated()": Only renders Login/Register buttons for anonymous guests.
      - sec:authorize="hasRole('ARTIST')": Displays the Artist Dashboard link only for users with the 'ARTIST' role.
    -->
    <nav th:fragment="navbar" class="navbar navbar-expand-lg border-bottom shadow-sm">
        <div class="container">
            <!-- Brand / Logo -->
            <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
                <img th:src="@{/images/logo.png}" alt="RevPlay Logo" style="height: 7vh; width: auto;">
            </a>

            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item mx-2">
                        <a class="nav-link px-0" th:href="@{/}">Home</a>
                    </li>
                    <li class="nav-item mx-2">
                        <a class="nav-link px-0" th:href="@{/discovery}">Explore</a>
                    </li>
                    <li class="nav-item mx-2" sec:authorize="isAuthenticated()">
                        <a class="nav-link px-0" th:href="@{/library/liked}">Favorites</a>
                    </li>
                    <li class="nav-item mx-2" sec:authorize="isAuthenticated()">
                        <a class="nav-link px-0" th:href="@{/library/playlists}">Playlists</a>
                    </li>
                    <li class="nav-item mx-2" sec:authorize="isAuthenticated()">
                        <a class="nav-link px-0" th:href="@{/social/history}">History</a>
                    </li>
                </ul>

                <!-- Right Side: Profile / Auth -->
                <div class="gap-3 d-flex align-items-center">

                    <div class="d-flex align-items-center" sec:authorize="isAuthenticated()">
                        <div class="dropdown">
                            <a href="#" class="d-block link-dark text-decoration-none dropdown-toggle-no-caret"
                                data-bs-toggle="dropdown" aria-expanded="false">
                                <img src="/images/default-profile.svg" class="rounded-circle shadow-sm border"
                                    width="35" height="35" alt="profile">
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end shadow border-0 mt-2">
                                <li><a class="dropdown-item py-2" th:href="@{/profile}">My Profile</a></li>
                                <li sec:authorize="hasRole('ARTIST')"><a class="dropdown-item py-2 text-warning"
                                        th:href="@{/artist/dashboard}">Artist Dashboard</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                                <li>
                                    <!-- th:action="@{/logout}": Maps the form to the Spring Security logout processor. -->
                                    <form th:action="@{/logout}" method="post" class="dropdown-item p-0">
                                        <button type="submit"
                                            class="btn btn-link dropdown-item text-danger py-2">Logout</button>
                                    </form>
                                </li>
                            </ul>
                        </div>
                    </div>

                    <div class="d-flex gap-2" sec:authorize="!isAuthenticated()">
                        <a th:href="@{/login}" class="btn btn-sm btn-outline-primary rounded-pill px-3">Login</a>
                        <a th:href="@{/register}" class="btn btn-sm btn-primary rounded-pill px-3">Register</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 
      Footer Fragment: th:fragment="footer"
      - th:replace="~{fragments/music-player :: player}": Injects the music player fragment from another file.
      - th:src="@{/js/player.js}": Includes the essential JavaScript logic for the platform's audio engine.
    -->
    <footer th:fragment="footer" class="text-center">
        <div sec:authorize="isAuthenticated()" th:replace="~{fragments/music-player :: player}"></div>
        <div class="container pb-3 border-top pt-3 border-light mt-5">
            <p class="text-secondary fw-bold">&copy; 2026 RevPlay. All rights reserved.</p>
            <p class="small text-muted">A beautiful musical monolith by Revature.</p>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script th:src="@{/js/player.js}"></script>
        <div th:replace="~{::confirmModal}"></div>
    </footer>

    <!-- Global Confirm Modal Fragment: th:fragment="confirmModal" -->

    <div th:fragment="confirmModal" class="modal fade" id="globalConfirmModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 400px;">
            <div class="modal-content border-0 shadow-lg rounded-4 overflow-hidden">
                <div class="modal-header border-0 pt-4 pb-0 text-center d-block">
                    <div class="mb-3 mx-auto d-flex align-items-center justify-content-center"
                        style="width: 60px; height: 60px; background: #fff5eb; border-radius: 50%; color: #FF6600; font-size: 1.8rem;">
                        ⚠
                    </div>
                    <h5 id="confirmModalTitle" class="modal-title fw-bold text-dark w-100">Confirm Action</h5>
                </div>
                <div class="modal-body py-3 text-center px-4">
                    <p id="confirmModalMessage" class="mb-0 text-secondary"
                        style="font-size: 0.95rem; line-height: 1.5;">Are you sure you want to proceed?</p>
                </div>
                <div class="modal-footer border-0 pt-2 pb-4 px-4 gap-2 d-flex">
                    <button type="button"
                        class="btn btn-light flex-grow-1 rounded-pill fw-bold text-muted shadow-none py-2"
                        data-bs-dismiss="modal">Cancel</button>
                    <button id="confirmModalConfirmBtn" type="button"
                        class="btn btn-primary flex-grow-1 rounded-pill fw-bold py-2 shadow-sm">Confirm</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

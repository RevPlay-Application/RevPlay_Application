<!-- Global Music Player UI
     Bottom fixed player containing song info, playback controls,
     progress bar, playlist actions, and volume control. -->

<div th:fragment="player" id="global-music-player"
    class="fixed-bottom shadow-lg border-top border-primary border-4 bg-white" style="display: none; z-index: 1050;">
    <div class="container px-2 px-md-4 py-2 py-md-3">
        <div class="row align-items-center player-controls-row">

            <!-- 1. Song Info (Left) -->
            <div class="col-6 col-md-3 d-flex align-items-center text-truncate">
                <div class="position-relative player-img-container">
                    <img id="player-cover" src="/images/default-album.svg" class="rounded shadow-sm border border-light"
                        style="object-fit: cover;">
                </div>
                <div class="ms-2 ms-md-3 text-truncate">
                    <h6 id="player-title" class="mb-0 fw-bold text-dark text-truncate player-title">
                        Waiting...</h6>
                    <small id="player-artist" class="text-muted text-truncate d-block"
                        style="font-size: 0.75rem;">RevPlay</small>
                </div>
            </div>

            <!-- 2. Controls & Seek Bar (Middle) -->
            <div
                class="col-12 col-md-6 order-3 order-md-2 flex-column d-flex align-items-center mt-2 mt-md-0 player-middle-column">
                <!-- Playback Buttons -->
                <div class="d-flex align-items-center mb-1">
                    <button id="player-shuffle" class="btn btn-link p-1 text-decoration-none hide-on-mobile"
                        title="Shuffle" onclick="Player.toggleShuffle()" style="color:#888;font-size:1rem;">🔀</button>
                    <button id="player-prev" class="btn btn-link text-muted p-2 text-decoration-none"
                        title="Previous Track">
                        <span style="font-size: 1.2rem;">⏮</span>
                    </button>
                    <button id="player-play-pause"
                        class="btn btn-primary rounded-circle mx-2 mx-md-3 shadow-sm d-flex align-items-center justify-content-center player-play-btn"
                        style="background: #FF6600; border: none;" title="Play/Pause">
                        <span id="play-pause-icon" class="player-icon-sm" style="margin-left: 2px;">▶</span>
                    </button>
                    <button id="player-next" class="btn btn-link text-muted p-2 text-decoration-none"
                        title="Next Track">
                        <span style="font-size: 1.2rem;">⏭</span>
                    </button>
                    <button id="player-repeat" class="btn btn-link p-1 text-decoration-none hide-on-mobile"
                        title="Repeat" onclick="Player.toggleRepeat()" style="color:#888;font-size:1rem;">🔁</button>
                </div>

                <!-- Seek Bar -->
                <div class="d-flex align-items-center w-100 px-1 px-md-3">
                    <span id="player-current-time" class="small text-muted"
                        style="min-width: 35px; font-size: 0.7rem;">0:00</span>
                    <input type="range" id="player-seek-bar" class="player-slider mx-2 mx-md-3 flex-grow-1" min="0"
                        max="100" value="0" step="0.1">
                    <span id="player-duration" class="small text-muted"
                        style="min-width: 35px; font-size: 0.7rem;">0:00</span>
                </div>

                <audio id="native-audio-player" preload="metadata" style="display: none;"></audio>
            </div>

            <!-- 3. Actions (Right) -->
            <div class="col-6 col-md-3 order-2 order-md-3 d-flex align-items-center justify-content-end gap-2 gap-md-3">
                <!-- Favorite -->
                <button id="player-like" class="btn btn-link p-0 text-decoration-none" title="Add to Favorites">
                    <span id="like-icon" class="text-muted player-action-icon">♡</span>
                </button>

                <!-- Add to Playlist -->
                <div class="dropup">
                    <button id="player-add-playlist"
                        class="btn btn-link p-0 text-decoration-none dropdown-toggle-no-caret" data-bs-toggle="dropdown"
                        aria-expanded="false" title="Add to Playlist">
                        <span class="text-muted player-secondary-icon">+</span>
                    </button>
                    <ul id="player-playlist-menu"
                        class="dropdown-menu dropdown-menu-end shadow-lg border-0 rounded-4 p-2"
                        style="min-width: 200px; background: white;">
                        <li class="dropdown-header text-primary fw-bold text-uppercase small player-dropdown-header">Add
                            to Playlist</li>
                        <li>
                            <hr class="dropdown-divider">
                        </li>
                        <div id="player-playlist-list">
                            <li class="px-3 py-2 text-muted small italic">Loading...</li>
                        </div>
                    </ul>
                </div>

                <!-- Volume -->
                <div class="d-flex align-items-center ms-2 d-none d-lg-flex" style="width: 90px;">
                    <span id="player-mute-btn" class="text-muted me-2"
                        style="font-size: 1.1rem; cursor: pointer; transition: transform 0.2s;"
                        title="Mute/Unmute">🔊</span>
                    <input type="range" id="player-volume" class="player-slider player-volume-slider" min="0" max="1"
                        value="0.8" step="0.05">
                </div>

                <!-- Close Player -->
                <button class="btn btn-link p-0 ms-2 text-decoration-none text-muted" title="Close Player"
                    onclick="Player.close()">
                    <span style="font-size: 1.2rem; font-weight: bold;">✕</span>
                </button>
            </div>
        </div>
    </div>
</div>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <div th:replace="~{fragments/layout :: head('Internal Error - RevPlay')}"></div>
</head>

<body>

    <div th:replace="~{fragments/layout :: navbar}"></div>

    <div class="container text-center mb-5 mt-5">
        <h1 class="display-1 text-danger fw-bold">500</h1>
        <h2 class="mb-4 text-dark">Internal Server Error</h2>
        <p class="lead text-muted mb-5">Something went wrong on our end. We're working on fixing it. Please try again
            later.</p>
        <p th:if="${message}" class="text-secondary small" th:text="${message}"></p>
        <a th:href="@{/}" class="btn btn-primary btn-lg mt-3">Return to Home</a>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>

</body>

</html>

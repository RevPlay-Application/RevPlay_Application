<!-- 
  Forgot Password View Template
  This page initiates the account recovery process.
  Users must provide their username and registered email address. The system then 
  verifies if this combination exists in the database. If successful, the user is 
  redirected to the 'Reset Password' page. This multi-step process ensures a 
  high level of security for account recovery.
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <!-- 
      th:replace: Injects the shared head fragment for consistent styling.
      The title is set to 'Forgot Password - RevPlay'.
    -->
    <div th:replace="~{fragments/layout :: head('Forgot Password - RevPlay')}"></div>
</head>

<body class="auth-body">
    <div class="container">
        <div class="row w-100 justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card border-0 auth-card overflow-hidden">
                    <div class="card-body p-4 p-md-5">

                        <div class="text-center mb-4">
                            <!-- th:src: Path to the logo image. -->
                            <img th:src="@{/images/logo.png}" alt="RevPlay Logo" class="mb-3"
                                style="height: 80px; width: auto;">
                            <h2 class="fw-bold mb-1" style="color: var(--primary-color);">Account Recovery</h2>
                            <p class="text-muted small">Verify your identity to reset password</p>
                        </div>

                        <!-- 
                          Status Alerts (th:if="${error}" / th:if="${message}"):
                          - th:if: Checks for existence of the 'error' or 'message' attributes in the Model.
                          - th:text: Injects the string content directly from the Model (e.g., "Account not found").
                        -->
                        <div th:if="${error}" class="alert alert-danger py-2 text-center small border-0 shadow-sm mb-4"
                            th:text="${error}"></div>
                        <div th:if="${message}"
                            class="alert alert-success py-2 text-center small border-0 shadow-sm mb-4"
                            th:text="${message}"></div>

                        <!-- 
                          Verification Form:
                          - th:action="@{/forgot-password}": Submits to the ForgotPasswordController's POST method.
                        -->
                        <form th:action="@{/forgot-password}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label fw-bold small text-muted">Username</label>
                                <!-- name="username": Mapped to the parameter in the controller method. -->
                                <input type="text" id="username" name="username"
                                    class="form-control rounded-2 border-light shadow-sm"
                                    placeholder="Enter your username" required autofocus />
                            </div>
                            <div class="mb-4">
                                <label for="email" class="form-label fw-bold small text-muted">Email Address</label>
                                <!-- name="email": Mapped to the parameter in the controller method. -->
                                <input type="email" id="email" name="email"
                                    class="form-control rounded-2 border-light shadow-sm" placeholder="Enter your email"
                                    required />
                            </div>
                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg rounded-2 fw-bold shadow">Verify
                                    Account</button>
                                <!-- th:href: Safe link to return to the login screen. -->
                                <a th:href="@{/login}"
                                    class="btn btn-link text-muted text-decoration-none small fw-bold">Back to Sign
                                    In</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>

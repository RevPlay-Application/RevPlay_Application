<!--
  Reset Password View Template
  This is the final step of the account recovery workflow.
  It is only accessible after the user's identity has been verified via the 'Forgot Password' step.
  The page captures a new password and a confirmation, then submits them to be 
  securely hashed and stored in the database. The 'username' is passed internally 
  to ensure we are updating the correct record.
-->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <!-- Injects the standard head fragment with a specific tab title. -->
    <div th:replace="~{fragments/layout :: head('Set New Password - RevPlay')}"></div>
</head>

<body class="auth-body">
    <div class="container">
        <div class="row w-100 justify-content-center">
            <div class="col-md-7 col-lg-6">
                <div class="card border-0 auth-card overflow-hidden">
                    <div class="card-body p-4 p-md-5">

                        <div class="text-center mb-4">
                            <img th:src="@{/images/logo.png}" alt="RevPlay Logo" class="mb-3"
                                style="height: 80px; width: auto;">
                            <h2 class="fw-bold mb-1" style="color: var(--primary-color);">Secure Your Account</h2>
                            <!-- th:text="${username}": Displays the username currently being recovered, fetched from the Model. -->
                            <p class="text-muted small">Account verified for: <strong th:text="${username}"
                                    class="text-dark">User</strong></p>
                        </div>

                        <!-- th:if="${error}": Displays server-side validation messages (e.g., "Passwords do not match"). -->
                        <div th:if="${error}" class="alert alert-danger py-2 text-center small border-0 shadow-sm mb-4"
                            th:text="${error}"></div>

                        <form th:action="@{/reset-password}" method="post">
                            <!-- 
                              Hidden Input: 
                              - th:value="${username}": Ensures the username is sent back with the POST request 
                                without requiring the user to re-type it.
                            -->
                            <input type="hidden" name="username" th:value="${username}" />

                            <div class="mb-3">
                                <label for="password" class="form-label fw-bold small text-muted">New Password</label>
                                <input type="password" id="password" name="password"
                                    class="form-control rounded-2 border-light shadow-sm"
                                    placeholder="Minimum 8 characters" required autofocus />
                            </div>

                            <div class="mb-4">
                                <label for="confirmPassword" class="form-label fw-bold small text-muted">Confirm New
                                    Password</label>
                                <input type="password" id="confirmPassword" name="confirmPassword"
                                    class="form-control rounded-2 border-light shadow-sm"
                                    placeholder="Repeat your password" required />
                            </div>

                            <div class="d-grid gap-2 mt-4">
                                <button type="submit" class="btn btn-primary btn-lg rounded-2 fw-bold shadow">Update
                                    Password</button>
                                <a th:href="@{/login}"
                                    class="btn btn-link text-muted text-decoration-none small fw-bold">Cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
